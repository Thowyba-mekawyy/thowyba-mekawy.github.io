<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const App = () => {
            const [darkMode, setDarkMode] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedGrade, setSelectedGrade] = useState('All');
            const [selectedStudent, setSelectedStudent] = useState(null);
            const [students, setStudents] = useState([
                { id: 1, name: "Sohaila Mekawy", emoji: "👩🏻‍💻", age: 21, email: "sohaila.mekawy@gmail.com", address: "Cairo", grade: "A", image: "https://i.pravatar.cc/150?img=20" },
                { id: 2, name: "Laila Samir", age: 22, email: "laila.samir@gmail.com", address: "Alex", grade: "B", image: "https://i.pravatar.cc/150?img=33" },
                { id: 3, name: "Rawan Adel", age: 20, email: "rawan.adel@gmail.com", address: "Giza", grade: "A", image: "https://i.pravatar.cc/150?img=14" },
                { id: 4, name: "Youssef Nader", age: 23, email: "youssef.nader@gmail.com", address: "Mansoura", grade: "C", image: "https://i.pravatar.cc/150?img=25" },
                { id: 5, name: "Farida Tamer", age: 19, email: "farida.tamer@gmail.com", address: "Tanta", grade: "B", image: "https://i.pravatar.cc/150?img=29" },
                { id: 6, name: "Nada Mostafa", age: 20, email: "nada.mostafa@gmail.com", address: "Mohandessin", grade: "A", image: "https://i.pravatar.cc/150?img=47" },
                { id: 7, name: "Mazem Ahmed", age: 19, email: "mazem.ahmed@gmail.com", address: "Gharbia", grade: "B", image: "https://i.pravatar.cc/150?img=44" },
                { id: 8, name: "Kenzy Gamal", age: 21, email: "kenzy.gamal@gmail.com", address: "6th October", grade: "A", image: "https://i.pravatar.cc/150?img=32" },
                { id: 9, name: "Seif Hassan", age: 22, email: "seif.hassan@gmail.com", address: "Dakahlia", grade: "B", image: "https://i.pravatar.cc/150?img=67" },
                { id: 10, name: "Joudy Ibrahim", age: 20, email: "joudy.ibrahim@gmail.com", address: "Assiut", grade: "C", image: "https://i.pravatar.cc/150?img=38" },
                { id: 11, name: "Hamza Kamel", age: 19, email: "hamza.kamel@gmail.com", address: "Ismailia", grade: "D", image: "https://i.pravatar.cc/150?img=45" }
            ]);

            useEffect(() => {
                const savedMode = localStorage.getItem('darkMode');
                if (savedMode) setDarkMode(JSON.parse(savedMode));
            }, []);

            useEffect(() => {
                localStorage.setItem('darkMode', JSON.stringify(darkMode));
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [darkMode]);

            const filteredStudents = students.filter(student => {
                const matchesSearch = student.name.toLowerCase().includes(searchTerm.toLowerCase());
                const matchesGrade = selectedGrade === 'All' || student.grade === selectedGrade;
                return matchesSearch && matchesGrade;
            });

            const getGradeColor = (grade) => {
                switch(grade) {
                    case 'A': return 'bg-gray-800';
                    case 'B': return 'bg-gray-600';
                    case 'C': return 'bg-gray-500';
                    case 'D': return 'bg-gray-400';
                    default: return 'bg-gray-300';
                }
            };

            const DetailsModal = ({ student, onClose }) => {
                if (!student) return null;
                return (
                    <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4" onClick={onClose}>
                        <div className={`rounded-3xl w-full max-w-sm shadow-2xl ${darkMode? 'bg-zinc-800' : 'bg-white'}`} onClick={e => e.stopPropagation()}>
                            <div className="p-6">
                                <div className="flex flex-col items-center mb-6">
                                    <img src={student.image} alt={student.name} className="w-28 h-28 rounded-full object-cover mb-4 ring-4 ring-gray-100"/>
                                    <h3 className={`text-2xl font-bold text-center ${darkMode? 'text-white' : 'text-gray-900'}`}>
                                        {student.name} {student.emoji}
                                    </h3>
                                    <span className={`mt-2 px-4 py-1 rounded-full text-sm font-bold text-white ${getGradeColor(student.grade)}`}>Grade {student.grade}</span>
                                </div>
                                <div className="space-y-4">
                                    <div className="flex items-center gap-3">
                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center ${darkMode? 'bg-zinc-700' : 'bg-gray-100'}`}>
                                            <span className="text-lg">👤</span>
                                        </div>
                                        <div>
                                            <p className={`text-xs ${darkMode? 'text-zinc-400' : 'text-gray-500'}`}>Age</p>
                                            <p className={`font-semibold ${darkMode? 'text-white' : 'text-gray-900'}`}>{student.age} years</p>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center ${darkMode? 'bg-zinc-700' : 'bg-gray-100'}`}>
                                            <span className="text-lg">📧</span>
                                        </div>
                                        <div>
                                            <p className={`text-xs ${darkMode? 'text-zinc-400' : 'text-gray-500'}`}>Email</p>
                                            <p className={`font-semibold text-sm ${darkMode? 'text-gray-300' : 'text-gray-700'}`}>{student.email}</p>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center ${darkMode? 'bg-zinc-700' : 'bg-gray-100'}`}>
                                            <span className="text-lg">📍</span>
                                        </div>
                                        <div>
                                            <p className={`text-xs ${darkMode? 'text-zinc-400' : 'text-gray-500'}`}>Address</p>
                                            <p className={`font-semibold ${darkMode? 'text-white' : 'text-gray-900'}`}>{student.address}</p>
                                        </div>
                                    </div>
                                </div>
                                <button onClick={onClose} className="w-full mt-6 py-3 bg-gray-800 text-white rounded-2xl font-semibold hover:bg-gray-900 transition-all">
                                    Close
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            const StudentCard = ({ student }) => (
                <div className={`rounded-2xl p-5 mb-3 transition-all hover:shadow-lg ${darkMode? 'bg-zinc-800' : 'bg-white'} shadow-md`}>
                    <div className="flex items-center justify-between mb-4">
                        <div className="flex items-center gap-4">
                            <img src={student.image} alt={student.name} className="w-12 h-12 rounded-full object-cover"/>
                            <div>
                                <h3 className={`font-bold text-lg ${darkMode? 'text-white' : 'text-gray-900'}`}>
                                    {student.name} {student.emoji}
                                </h3>
                                <p className={`text-sm ${darkMode? 'text-zinc-400' : 'text-gray-500'}`}>Age {student.age}</p>
                            </div>
                        </div>
                        <div className={`w-10 h-10 rounded-full flex items-center justify-center text-white font-bold text-sm ${getGradeColor(student.grade)}`}>
                            {student.grade}
                        </div>
                    </div>
                    <button
                        onClick={() => setSelectedStudent(student)}
                        className="w-full py-3 bg-teal-700 text-white rounded-xl hover:bg-teal-800 transition-all font-semibold shadow-sm"
                    >
                        View Details
                    </button>
                </div>
            );

            const grades = ['All', 'A', 'B', 'C', 'D'];

            return (
                <div className={`min-h-screen ${darkMode? 'bg-zinc-950' : 'bg-gray-50'}`}>
                    <div className="bg-gray-900 px-6 py-5 shadow-lg">
                        <div className="max-w-2xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <span className="text-2xl">🎓</span>
                                <h1 className="text-2xl font-bold text-white">Student Directory</h1>
                            </div>
                            <button
                                onClick={() => setDarkMode(!darkMode)}
                                className="p-2.5 rounded-xl bg-white/10 hover:bg-white/20 transition-all backdrop-blur-sm"
                            >
                                {darkMode? '🌙' : '☀️'}
                            </button>
                        </div>
                    </div>
                    <div className="max-w-2xl mx-auto p-5">
                        <div className={`relative mb-5 ${darkMode? 'bg-zinc-800' : 'bg-white'} rounded-2xl shadow-sm`}>
                            <div className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">🔍</div>
                            <input
                                type="text"
                                placeholder="Search by name..."
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                                className={`w-full pl-12 pr-4 py-3.5 rounded-2xl border-none focus:outline-none focus:ring-2 focus:ring-gray-500 transition-all ${
                                    darkMode? 'bg-zinc-800 text-white placeholder-zinc-500' : 'bg-white text-gray-900 placeholder-gray-400'
                                }`}
                            />
                        </div>
                        <div className="flex gap-2 mb-4 overflow-x-auto pb-2">
                            {grades.map(grade => (
                                <button
                                    key={grade}
                                    onClick={() => setSelectedGrade(grade)}
                                    className={`px-6 py-2.5 rounded-full whitespace-nowrap font-semibold transition-all ${
                                        selectedGrade === grade
                             ? 'bg-gray-900 text-white shadow-md'
                                            : darkMode? 'bg-zinc-800 text-zinc-300 hover:bg-zinc-700' : 'bg-white text-gray-700 hover:bg-gray-100 border border-gray-200'
                                    }`}
                                >
                                    {grade === 'All'? 'All' : `Grade ${grade}`}
                                </button>
                            ))}
                        </div>
                        <p className={`mb-4 text-sm ${darkMode? 'text-zinc-400' : 'text-gray-600'}`}>
                            {filteredStudents.length} students
                        </p>
                        <div>
                            {filteredStudents.map(student => (
                                <StudentCard key={student.id} student={student} />
                            ))}
                        </div>
                        {filteredStudents.length === 0 && (
                            <div className={`text-center py-16 ${darkMode? 'text-zinc-500' : 'text-gray-400'}`}>
                                <p className="text-lg font-medium">No students found</p>
                            </div>
                        )}
                    </div>
                    <DetailsModal student={selectedStudent} onClose={() => setSelectedStudent(null)} />
                </div>
            );
        };
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
